<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Statue of Unity</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800;900&family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- QR Code Library (QRious) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    
    <!-- TensorFlow.js and COCO-SSD for Human Detection -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #150f07 0%, #1a1005 50%, #080501 100%);
            --glass-bg: rgba(223, 169, 56, 0.02);
            --glass-border: rgba(223, 169, 56, 0.1);
            --glass-hover-bg: rgba(223, 169, 56, 0.05);
            --glass-hover-border: rgba(223, 169, 56, 0.2);
            --accent-primary: #d4af37;
            --accent-secondary: #aa7c11;
            --accent-gradient: linear-gradient(135deg, #d4af37 0%, #aa7c11 100%);
            --accent-gradient-hover: linear-gradient(135deg, #e5c158 0%, #bc8d1f 100%);
            --text-primary: #fdfaf2;
            --text-secondary: #cfc2a9;
            --text-muted: #857b68;
            --success: #d4af37;
            --error: #cf4f4f;
            --card-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #d4af37, #aa7c11);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
        }

        /* Stepper Flow Indicator */
        .stepper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 0.5rem auto 1.5rem auto;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            max-width: 540px;
            width: 100%;
            backdrop-filter: blur(8px);
        }

        .step {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .step.active {
            color: var(--text-primary);
        }

        .step.completed {
            color: var(--success);
        }

        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .step.active .step-num {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
        }

        .step.completed .step-num {
            background: var(--success);
            border-color: transparent;
            color: white;
        }

        .step-line {
            height: 2px;
            flex: 1;
            max-width: 40px;
            background: var(--glass-border);
            border-radius: 1px;
            transition: background 0.3s ease;
        }

        .step.completed + .step-line {
            background: var(--success);
        }

        /* Glassmorphism Card Style */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: var(--card-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .card:hover {
            border-color: var(--glass-hover-border);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.45);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .panel-title {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* Screen Navigation / Container */
        .screen {
            width: 100%;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .screen.hidden {
            display: none !important;
        }

        /* AI Badge Indicator */
        .ai-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #b566ff;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 0.35rem 0.8rem;
            border-radius: 20px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse 1.6s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 8px rgba(16, 185, 129, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        /* Media Containers */
        .media-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            border: 2px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .camera-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            border: 2px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        #attract-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #camera-stream {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-placeholder {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
            z-index: 2;
        }

        .camera-placeholder svg {
            width: 56px;
            height: 56px;
            fill: currentColor;
            opacity: 0.7;
        }

        /* Floating Button Styles */
        .btn-capture-floating {
            position: absolute;
            bottom: 24px;
            right: 24px;
            z-index: 15;
            background: var(--accent-gradient);
            color: white;
            padding: 1.1rem 2rem;
            border-radius: 50px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border: 2px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 10px 25px rgba(138, 43, 226, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .btn-capture-floating:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow: 0 15px 30px rgba(138, 43, 226, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            background: var(--accent-gradient-hover);
        }

        .btn-capture-floating:active {
            transform: translateY(-1px) scale(0.98);
        }

        .round-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            transition: all 0.2s;
        }

        .round-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.08);
        }

        /* Buttons Styling */
        .btn-group {
            display: flex;
            gap: 1rem;
            width: 100%;
            margin-top: 1rem;
        }

        .btn {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 14px rgba(138, 43, 226, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-gradient-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.6);
        }

        .btn-secondary {
            background: var(--glass-bg);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--glass-hover-bg);
            border-color: var(--glass-hover-border);
            transform: translateY(-2px);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Previews and Results */
        .preview-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border);
            position: relative;
        }

        #result-photo-preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .workspace-result {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 768px) {
            .workspace-result {
                grid-template-columns: 1fr;
            }
        }

        /* QR Code & Output Section */
        .mode-selector {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 0.25rem;
            display: flex;
            gap: 0.25rem;
            border: 1px solid var(--glass-border);
            margin-bottom: 1.25rem;
        }

        .mode-btn {
            flex: 1;
            padding: 0.6rem;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .mode-btn.active {
            background: var(--glass-hover-bg);
            color: var(--text-primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .output-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .qr-wrapper {
            background: #ffffff;
            padding: 1.25rem;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            width: 210px;
            height: 210px;
        }

        .qr-wrapper.loading::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
        }

        .qr-spinner {
            display: none;
            position: absolute;
            z-index: 10;
            width: 44px;
            height: 44px;
            border: 4px solid rgba(138, 43, 226, 0.1);
            border-left-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #qr-code {
            max-width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
        }

        .status-message {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.45;
            max-width: 280px;
        }

        .status-message.success { color: var(--success); }
        .status-message.error { color: var(--error); }

        /* Hidden Canvas */
        #process-canvas {
            display: none;
        }

        .badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
        }

        .badge-cloud {
            color: #38bdf8;
            border-color: rgba(56, 189, 248, 0.2);
            background: rgba(56, 189, 248, 0.05);
        }

        .badge-offline {
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.2);
            background: rgba(251, 191, 36, 0.05);
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Timer SVG styles */
        .timer-svg {
            transform: rotate(-90deg);
        }

        /* Fullscreen Attract Screen Video */
        #screen-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            z-index: 999;
            background: #000;
            overflow: hidden;
        }

        #screen-video #attract-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
            border-radius: 0;
            box-shadow: none;
        }

        #screen-video #btn-start-capture {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="container">


        <!-- SCREEN 1: Video Attract Screen -->
        <div class="screen" id="screen-video">
            <video id="attract-video" loop muted autoplay playsinline>
                <source src="./vidssave.com Why is Sardar Vallabhbhai Patel considered the architect of modern India_ 720p.mp4" type="video/mp4">
            </video>
            
            <!-- Floating Take My Picture Button (bottom-right) -->
            <button class="btn-capture-floating" id="btn-start-capture">
                <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24" style="margin-right: 4px;">
                    <path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m8 3a5 5 0 0 0-5 5 5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5m0 2a3 3 0 0 1 3 3 3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3z"/>
                </svg>
                Take my picture
            </button>
        </div>

        <!-- SCREEN 2: Camera Capture Screen -->
        <div class="screen hidden" id="screen-camera">
            <div class="card capture-panel fade-in">
                <div class="panel-header" style="justify-content: flex-end;">
                    <div class="ai-badge" id="ai-status">
                        <span class="pulse-dot"></span>
                        <span class="ai-text">AI Human Detection Active</span>
                    </div>
                </div>
                
                <div class="camera-container" id="camera-container">
                    <video id="camera-stream" autoplay playsinline style="display: none;"></video>
                    
                    <!-- Countdown Overlay -->
                    <div id="countdown-overlay" style="display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 20; flex-direction: column; align-items: center; justify-content: center; color: white;">
                        <h2 style="font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; color: #d4af37; letter-spacing: 1px;">Strike a Pose</h2>
                        <h3 style="font-family: 'Cinzel', serif; font-size: 1.5rem; margin-bottom: 1.5rem; color: #fdfaf2; letter-spacing: 1px;">Look at the camera!</h3>
                        <span id="countdown-number" style="font-family: 'Cinzel', serif; font-size: 6rem; font-weight: 800; text-shadow: 0 4px 15px rgba(0,0,0,0.6); color: #d4af37;">5</span>
                    </div>

                    <div class="camera-placeholder" id="camera-placeholder">
                        <svg viewBox="0 0 24 24">
                            <path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m8 3a5 5 0 0 0-5 5 5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5m0 2a3 3 0 0 1 3 3 3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3z"/>
                        </svg>
                        <p style="margin-top: 0.5rem;">Initializing camera feed...</p>
                    </div>

                    <!-- Floating Switch Camera Button (bottom-left) -->
                    <button class="round-btn" id="switch-camera-btn" title="Switch Camera" style="position: absolute; bottom: 24px; left: 24px; z-index: 15; display: none;">
                        <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/>
                        </svg>
                    </button>


                </div>

                <div class="btn-group">
                    <button class="btn btn-secondary" id="btn-cancel-capture" style="max-width: 200px;">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                        Cancel
                    </button>
                </div>
            </div>
        </div>

        <!-- SCREEN 3: Result & QR Screen (1-minute timer) -->
        <div class="screen hidden" id="screen-result">
            <div class="workspace-result fade-in">
                <!-- Left panel: processed polaroid-like watermarked photo -->
                <div class="card photo-result-card">
                    <h3 class="panel-title" style="margin-bottom: 1.5rem;">Your Photo</h3>
                    <div class="preview-container">
                        <img id="result-photo-preview" alt="Final Photo Preview">
                    </div>

                </div>

                <!-- Right panel: QR code and 60-second timer -->
                <div class="card qr-result-card" style="display: flex; flex-direction: column; justify-content: space-between;">
                    <div>
                        <h3 class="panel-title" style="margin-bottom: 1rem; color: var(--accent-primary);">Scan QR Code</h3>
                        
                        <!-- Thank You Message -->
                        <p style="font-size: 1.05rem; line-height: 1.5; color: var(--text-primary); font-weight: 500; text-align: center; margin-bottom: 1.25rem; padding: 0 0.5rem;">
                            Thank you for visiting Statue of Unity, scan the QR to view your image.
                        </p>

                        <!-- Circular 60s Countdown Timer -->
                        <div style="display: flex; justify-content: center; margin-bottom: 1.25rem;">
                            <div style="display: flex; align-items: center; gap: 0.6rem; background: rgba(255, 255, 255, 0.04); padding: 0.5rem 1.25rem; border-radius: 50px; border: 1px solid var(--glass-border);">
                                <svg class="timer-svg" width="22" height="22" viewBox="0 0 24 24">
                                    <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.1)" stroke-width="2.5" fill="none" />
                                    <circle cx="12" cy="12" r="10" stroke="var(--success)" stroke-width="2.5" fill="none" stroke-dasharray="62.8" stroke-dashoffset="0" id="timer-circle" style="transition: stroke-dashoffset 1s linear;" />
                                </svg>
                                <span style="font-weight: 600; font-size: 0.85rem; color: var(--text-secondary);">
                                    Returning in <span id="timer-seconds" style="color: var(--success); font-family: 'Cinzel', serif; font-weight: 800; font-size: 1rem;">60</span>s
                                </span>
                            </div>
                        </div>
                        
                        <div class="mode-selector">
                            <button class="mode-btn active" id="mode-cloud-btn" title="Uploads image temporarily online for best quality scan">
                                <span class="badge badge-cloud">Cloud</span>
                                Dynamic Link
                            </button>
                            <button class="mode-btn" id="mode-offline-btn" title="Creates QR code using compressed offline representation (highly pixelated)">
                                <span class="badge badge-offline">Offline</span>
                                Micro-Image
                            </button>
                        </div>
                    </div>

                    <div class="output-container">
                        <div class="qr-wrapper" id="qr-wrapper">
                            <div class="qr-spinner" id="qr-spinner"></div>
                            <canvas id="qr-code"></canvas>
                        </div>

                        <div class="status-message" id="status-message">
                            QR Code loading...
                        </div>
                    </div>
                </div>
            </div>

            <div style="text-align: center; margin-top: 2rem;">
                <button class="btn btn-primary" id="restart-btn" style="width: auto; min-width: 240px; padding: 1rem 2rem;">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 6H16" />
                    </svg>
                    Start Over / Attract Screen
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden Canvas for Processing -->
    <canvas id="process-canvas"></canvas>

    <script>
        // Core elements
        const video = document.getElementById('camera-stream');
        const cameraPlaceholder = document.getElementById('camera-placeholder');
        const cameraContainer = document.getElementById('camera-container');
        const attractVideo = document.getElementById('attract-video');
        
        const btnStartCapture = document.getElementById('btn-start-capture');
        const btnCancelCapture = document.getElementById('btn-cancel-capture');
        const switchCameraBtn = document.getElementById('switch-camera-btn');
        
        const resultPhotoPreview = document.getElementById('result-photo-preview');
        const processCanvas = document.getElementById('process-canvas');
        
        const modeCloudBtn = document.getElementById('mode-cloud-btn');
        const modeOfflineBtn = document.getElementById('mode-offline-btn');
        const qrWrapper = document.getElementById('qr-wrapper');
        const qrSpinner = document.getElementById('qr-spinner');
        const qrCanvas = document.getElementById('qr-code');
        const statusMessage = document.getElementById('status-message');

        // Navigation / Reset elements
        const restartBtn = document.getElementById('restart-btn');

        // State variables
        let objectDetector = null;
        let detectionInterval = null;
        let countdownTimer = null;
        let isCountingDown = false;
        let localStream = null;
        let activeFacingMode = 'environment'; // default to back camera
        let processedImageBlob = null;
        let processedImageURL = null; // cloud URL
        let qrMode = 'cloud'; // 'cloud' or 'offline'
        let qrInstance = null;

        // Reset timer state variables
        let resetSecondsInterval = null;
        let secondsRemaining = 60;

        // Load Logo Image
        const logoImg = new Image();
        logoImg.src = './logo.png';

        // Attract video stock fallback URL in case local video fails or doesn't exist
        attractVideo.addEventListener('error', () => {
            console.log("Local kiosk video not found. Falling back to online stock video.");
            attractVideo.src = "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4";
            attractVideo.load();
            attractVideo.play().catch(e => console.error("Error playing stock video fallback:", e));
        });

        // Load the COCO-SSD model for person detection
        if (typeof cocoSsd !== 'undefined') {
            cocoSsd.load().then(model => {
                objectDetector = model;
                const textEl = document.querySelector('#ai-status .ai-text');
                if (textEl) textEl.textContent = "AI Human Detection Active";
                console.log("Model loaded for human detection.");
            });
        }

        // Initialize QR Code generator
        function initQR(value = 'https://statueofunity.in/') {
            qrInstance = new QRious({
                element: qrCanvas,
                size: 210,
                value: value,
                level: 'M',
                background: '#ffffff',
                foreground: '#000000'
            });
        }
        initQR();

        // Navigation state machine
        function showScreen(screenId) {
            // Hide all screens
            document.querySelectorAll('.screen').forEach(scr => scr.classList.add('hidden'));
            
            // Remove active classes from stepper
            document.querySelectorAll('.step').forEach(step => step.classList.remove('active', 'completed'));

            const s1 = document.getElementById('step-1');
            const s2 = document.getElementById('step-2');
            const s3 = document.getElementById('step-3');

            // Toggle screens and setup page actions
            if (screenId === 'screen-video') {
                if (s1) s1.classList.add('active');
                
                // Stop camera & stop reset timer
                stopCamera();
                stopResetTimer();
                
                // Start video loop
                attractVideo.play().catch(e => console.log("Attract video play deferred: ", e));
            } else if (screenId === 'screen-camera') {
                if (s1) s1.classList.add('completed');
                if (s2) s2.classList.add('active');
                
                // Pause attract video, start camera stream and countdown immediately
                attractVideo.pause();
                stopResetTimer();
                startCamera();
            } else if (screenId === 'screen-result') {
                if (s1) s1.classList.add('completed');
                if (s2) s2.classList.add('completed');
                if (s3) s3.classList.add('active');
                
                // Pause attract video, stop camera, and start 60s countdown
                attractVideo.pause();
                stopCamera();
                startResetTimer();
            }

            // Show active screen
            const activeScreen = document.getElementById(screenId);
            activeScreen.classList.remove('hidden');
        }

        // 1. Camera Control
        async function startCamera() {
            try {
                if (localStream) {
                    stopCamera();
                }

                const constraints = {
                    video: {
                        facingMode: activeFacingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };

                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = localStream;
                video.style.display = 'block';
                cameraPlaceholder.style.display = 'none';
                cameraContainer.classList.add('active');
                
                // Show floating control overlays
                switchCameraBtn.style.display = 'flex';
                
                // Start camera capture countdown instantly
                startCaptureCountdown();
                
                // Start detection loop
                if (!detectionInterval) {
                    detectionInterval = setInterval(detectHuman, 500);
                }
            } catch (err) {
                console.error("Error accessing camera:", err);
                cameraPlaceholder.style.display = 'flex';
                cameraPlaceholder.innerHTML = `
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                    </svg>
                    <p style="margin-top: 0.5rem; color: var(--error);">Could not access camera. Grant permissions to continue.</p>
                    <button class="btn btn-primary" onclick="startCamera()" style="margin-top: 1rem; width: auto; padding: 0.75rem 1.5rem;">Try Again</button>
                `;
                stopCamera();
            }
        }

        function stopCamera() {
            if (detectionInterval) {
                clearInterval(detectionInterval);
                detectionInterval = null;
            }
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
            isCountingDown = false;
            document.getElementById('countdown-overlay').style.display = 'none';
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            video.style.display = 'none';
            video.srcObject = null;
            cameraContainer.classList.remove('active');
            
            // Hide floating overlays
            switchCameraBtn.style.display = 'none';
        }

        switchCameraBtn.addEventListener('click', () => {
            activeFacingMode = activeFacingMode === 'user' ? 'environment' : 'user';
            if (localStream) {
                startCamera();
            }
        });

        async function detectHuman() {
            if (!objectDetector || !localStream || video.readyState !== 4 || isCountingDown) return;
            try {
                const predictions = await objectDetector.detect(video);
                if (predictions.some(p => p.class === 'person' && p.score > 0.6)) {
                    console.log("Human detected!");
                }
            } catch(e) {
                console.error("Detection error:", e);
            }
        }

        function startCaptureCountdown() {
            isCountingDown = true;
            const overlay = document.getElementById('countdown-overlay');
            const numSpan = document.getElementById('countdown-number');
            overlay.style.display = 'flex';
            
            let count = 5;
            numSpan.innerText = count;
            
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                count--;
                if (count > 0) {
                    numSpan.innerText = count;
                } else {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    overlay.style.display = 'none';
                    capturePhoto();
                    isCountingDown = false;
                }
            }, 1000);
        }

        // 2. Image Capturing
        function capturePhoto() {
            if (!localStream) return;
            
            const ctx = processCanvas.getContext('2d');
            const vW = video.videoWidth;
            const vH = video.videoHeight;
            
            const borderTopLR = Math.round(vW * 0.03); // 3% border left/right/top
            const borderBottom = Math.round(vH * 0.12); // 12% border bottom
            
            processCanvas.width = vW + (borderTopLR * 2);
            processCanvas.height = vH + borderTopLR + borderBottom;
            
            // Draw white border background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, processCanvas.width, processCanvas.height);
            
            // Draw video frame inside border
            ctx.drawImage(video, borderTopLR, borderTopLR, vW, vH);
            
            // Process image: watermark it!
            applyWatermark(processCanvas.width, processCanvas.height, borderBottom, borderTopLR, vW, vH);
            
            // Transition to Screen 3 (Result & QR Code)
            showScreen('screen-result');
            triggerQRUpdate();
        }

        // 3. Canvas Manipulation & Watermarking
        function applyWatermark(w, h, borderBottom, borderTopLR, vW, vH) {
            const ctx = processCanvas.getContext('2d');

            // Configure text properties for "STATUE OF UNITY"
            const fontSize = Math.max(24, Math.round(borderBottom * 0.6));
            ctx.font = `700 ${fontSize}px 'Cinzel', serif`;
            
            // Vibrant gradient fill for text
            const textGradient = ctx.createLinearGradient(0, h - borderBottom, w, h);
            textGradient.addColorStop(0, '#d4af37');
            textGradient.addColorStop(1, '#aa7c11');
            ctx.fillStyle = textGradient;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Text shadows
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            const textX = w / 2;
            const textY = h - (borderBottom / 2);

            ctx.fillText('STATUE OF UNITY', textX, textY);

            // Reset shadows
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;

            // Draw Logo inside the actual photo frame
            if (logoImg.complete && logoImg.naturalWidth !== 0) {
                const maxLogoHeight = vH * 0.28; // 28% of photo height
                const aspectRatio = logoImg.naturalWidth / logoImg.naturalHeight;
                const logoHeight = maxLogoHeight;
                const logoWidth = logoHeight * aspectRatio;

                // Padding from the edge of the actual photo frame
                const padding = Math.round(vH * 0.04); 

                const logoX = borderTopLR + vW - logoWidth - padding;
                const logoY = borderTopLR + vH - logoHeight - padding;

                ctx.drawImage(logoImg, logoX, logoY, logoWidth, logoHeight);
            }

            // Update result preview image
            const imgDataURL = processCanvas.toDataURL('image/jpeg', 0.9);
            resultPhotoPreview.src = imgDataURL;

            // Convert canvas output to JPEG blob for cloud upload
            processCanvas.toBlob((blob) => {
                processedImageBlob = blob;
                processedImageURL = null; // reset old URL
            }, 'image/jpeg', 0.88);
        }

        // Start Capture screen from Attract Screen
        btnStartCapture.addEventListener('click', () => {
            // Request Fullscreen to hide Chrome toolbar/address bar
            const docEl = document.documentElement;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (docEl.requestFullscreen) {
                    docEl.requestFullscreen().catch(err => {
                        console.log("Error attempting to enable fullscreen:", err);
                    });
                } else if (docEl.webkitRequestFullscreen) {
                    docEl.webkitRequestFullscreen();
                }
            }
            showScreen('screen-camera');
        });

        // Cancel capture and return to attract screen
        btnCancelCapture.addEventListener('click', () => {
            restartFlow();
        });

        // Reset / Restart Flow Button
        restartBtn.addEventListener('click', () => {
            restartFlow();
        });

        function restartFlow() {
            processedImageBlob = null;
            processedImageURL = null;
            resultPhotoPreview.removeAttribute('src');
            initQR();
            showScreen('screen-video');
        }

        // 4. QR Code Modes & Generation
        modeCloudBtn.addEventListener('click', () => {
            if (qrMode === 'cloud') return;
            qrMode = 'cloud';
            modeCloudBtn.classList.add('active');
            modeOfflineBtn.classList.remove('active');
            triggerQRUpdate();
        });

        modeOfflineBtn.addEventListener('click', () => {
            if (qrMode === 'offline') return;
            qrMode = 'offline';
            modeOfflineBtn.classList.add('active');
            modeCloudBtn.classList.remove('active');
            triggerQRUpdate();
        });

        function showQRLoading(loading) {
            if (loading) {
                qrWrapper.classList.add('loading');
                qrSpinner.style.display = 'block';
            } else {
                qrWrapper.classList.remove('loading');
                qrSpinner.style.display = 'none';
            }
        }

        function triggerQRUpdate() {
            if (!processedImageBlob) return;

            if (qrMode === 'cloud') {
                if (processedImageURL) {
                    initQR(processedImageURL);
                    statusMessage.className = "status-message success";
                    statusMessage.innerText = "QR Code linked successfully to cloud photo!";
                } else {
                    uploadAndGenerateQR();
                }
            } else {
                generateOfflineQR();
            }
        }

        async function uploadAndGenerateQR() {
            showQRLoading(true);
            statusMessage.className = "status-message";
            statusMessage.innerText = "Uploading watermarked image...";

            const formData = new FormData();
            formData.append('file', processedImageBlob, 'statue_of_unity_photo.jpg');

            try {
                // Uploading to tmpfiles.org
                const response = await fetch('https://tmpfiles.org/api/v1/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Network error uploading image.');

                const result = await response.json();

                if (result.status === 'success' && result.data && result.data.url) {
                    processedImageURL = result.data.url;
                    
                    initQR(processedImageURL);
                    statusMessage.className = "status-message success";
                    statusMessage.innerText = "Secure QR generated! Scanners will open high-quality photo in the browser (expires in 24 hours).";
                } else {
                    throw new Error(result.message || 'Upload endpoint responded with failure.');
                }
            } catch (err) {
                console.error("Cloud upload error:", err);
                statusMessage.className = "status-message error";
                statusMessage.innerText = "Cloud upload failed. Reverting to Offline Mode QR.";
                // Fallback to offline mode
                qrMode = 'offline';
                modeOfflineBtn.classList.add('active');
                modeCloudBtn.classList.remove('active');
                generateOfflineQR();
            } finally {
                showQRLoading(false);
            }
        }

        function generateOfflineQR() {
            showQRLoading(true);
            statusMessage.className = "status-message";
            statusMessage.innerText = "Compressing offline image data...";

            // Create low-res micro version to fit within QR limits (~2KB max)
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCanvas.width = 45;
            tempCanvas.height = 45;
            
            tempCtx.drawImage(processCanvas, 0, 0, 45, 45);
            
            // Get data URL with low quality JPEG encoding
            const base64Data = tempCanvas.toDataURL('image/jpeg', 0.2);

            setTimeout(() => {
                initQR(base64Data);
                showQRLoading(false);
                statusMessage.className = "status-message success";
                statusMessage.innerText = "Offline Micro-Image QR Code generated! Works completely offline, scanner will open a compressed low-res image.";
            }, 100);
        }

        // 5. 60-Second Countdown Timer Reset Functionality
        function startResetTimer() {
            stopResetTimer();
            secondsRemaining = 60;
            const timerSecondsEl = document.getElementById('timer-seconds');
            const timerCircle = document.getElementById('timer-circle');
            
            if (timerSecondsEl) timerSecondsEl.textContent = secondsRemaining;
            if (timerCircle) timerCircle.style.strokeDashoffset = "0";

            resetSecondsInterval = setInterval(() => {
                secondsRemaining--;
                if (timerSecondsEl) timerSecondsEl.textContent = secondsRemaining;
                
                if (timerCircle) {
                    const offset = 62.8 * (1 - secondsRemaining / 60);
                    timerCircle.style.strokeDashoffset = offset;
                }
                
                if (secondsRemaining <= 0) {
                    stopResetTimer();
                    restartFlow();
                }
            }, 1000);
        }

        function stopResetTimer() {
            if (resetSecondsInterval) {
                clearInterval(resetSecondsInterval);
                resetSecondsInterval = null;
            }
        }

        // Initialize to screen 1 on page load
        window.addEventListener('DOMContentLoaded', () => {
            showScreen('screen-video');
        });
    </script>
</body>
</html>
